  <text x="600" y="270" text-anchor="middle" dominant-baseline="central" font-family="IBM Plex Mono, monospace" font-weight="600" font-size="180" letter-spacing="-2"><tspan fill="#4589FF">wx</tspan><tspan fill="#F4F4F4">ctl</tspan></text>
